# =============================================================================
# Backup Home Manager - Configuration File
# =============================================================================
# Location: $XDG_CONFIG_HOME/bhm/bhm.conf or /etc/bhm/bhm.conf
# Format: KEY="VALUE" (sourced by Bash)

# --- Source & Destination ------------------------------------------------
BACKUP_SRC="$HOME"
BACKUP_DST="${XDG_DATA_HOME:-$HOME/.local/share}/bhm/backups"

# --- Backup Identity -----------------------------------------------------
BACKUP_HOST="$(hostname -s 2>/dev/null || echo 'localhost')"
BACKUP_USER="${USER}"

# --- Retention Policy ----------------------------------------------------
# Number of backups to keep per tier
RETENTION_DAILY="7"       # Keep 7 latest backups
RETENTION_WEEKLY="4"      # Keep 4 weekly backups (Sundays)
RETENTION_MONTHLY="3"     # Keep 3 monthly backups (1st of month)

# --- RSYNC Options -------------------------------------------------------
# --link-dest is always enabled for incremental backups
RSYNC_OPTS=(
  --archive
  --hard-links
  --xattrs
  --acls
  --one-file-system
  --delete
  --delete-excluded
  --partial
  --progress
  --human-readable
  --stats
)

# --- Exclude Patterns ----------------------------------------------------
# Add patterns relative to BACKUP_SRC
EXCLUDE_PATTERNS=(
  # Dependencies / build artifacts
  node_modules/
  vendor/
  .tox/
  .eggs/
  __pycache__/
  *.pyc
  *.pyo
  target/
  build/
  dist/
  .next/
  .turbo/

  # Caches
  .cache/
  Local/   # flatpak local data
  cache/
  .local/share/Trash/
  .local/share/bhm/    # our own backup dir
  .m2/repository/
  cargo/registry/
  go/pkg/mod/

  # Temp files
  *.tmp
  *.temp
  ~*
  .~*
  *.swp
  *.swo
  core.*
  Thumbs.db
  .DS_Store

  # Large media (optional — uncomment if desired)
  # *.iso
  # *.mp4
  # *.mkv
  # *.avi

  # Virtual machines / containers
  *.vdi
  *.vmdk
  *.qcow2
  Vagrantfile
  .vagrant/

  # Secrets / env
  .env
  .env.*
  *.pem
  *.key
  vault-password-*

  # IDE / editor
  .idea/
  .vscode/
  *.sublime-*

  # Logs
  *.log
  npm-debug.log*
  yarn-error.log*
  .npm/
  .yarn/
)

# --- Btrfs Snapshots -----------------------------------------------------
BTRFS_ENABLE="no"
# Mount-point of the Btrfs subvolume containing BACKUP_DST
BTRFS_SUBVOL=""
# Snapshot prefix (default: bhm-)
BTRFS_SNAPSHOT_PREFIX="bhm-"
# Number of snapshots to keep (0 = keep all)
BTRFS_RETENTION="7"

# --- Integrity Verification ----------------------------------------------
VERIFY_CHECKSUM="yes"       # Run checksum check after backup
VERIFY_SAMPLE_PCT="5"       # % of files to checksum-verify (0 = all in listing)

# --- Logging -------------------------------------------------------------
LOG_DIR="${XDG_STATE_HOME:-$HOME/.local/state}/bhm/logs"
LOG_LEVEL="INFO"            # DEBUG, INFO, WARN, ERROR
LOG_MAX_FILES="14"          # Keep N log files during rotation
LOG_MAX_SIZE="5242880"      # Max bytes per log file (5 MiB)

# --- Notifications -------------------------------------------------------
NOTIFY_ON_SUCCESS="no"
NOTIFY_ON_FAILURE="yes"
